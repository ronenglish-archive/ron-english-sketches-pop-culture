<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ron English Sketches: Pop Culture</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111014;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.16);
      --text: #f5f2ea;
      --muted: rgba(245,242,234,0.72);
      --accent: #fb7185;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(251, 113, 133, 0.17), transparent 30rem),
        radial-gradient(circle at 80% 72%, rgba(96, 165, 250, 0.10), transparent 28rem),
        var(--bg);
      color: var(--text);
    }
    main {
      width: min(980px, calc(100vw - 2rem));
      padding: clamp(2rem, 5vw, 4rem);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      text-align: center;
    }
    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
    }
    p {
      max-width: 720px;
      margin: 1.2rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.7;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 2rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.75rem 1.05rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.07);
    }
    a.primary {
      background: var(--accent);
      color: #1d070c;
      border-color: transparent;
      font-weight: 700;
    }
  </style>
  <link rel="icon" type="image/png" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/favicon.png">
</head>
<body>
  <main>
    <p class="eyebrow">Ron English sketches and drawings</p>
    <h1>Pop Culture</h1>
    <p>This standalone repository contains the celebrity, character, Combrats, and TVities sections of the sketches-and-drawings catalogue.</p>
    <div class="actions">
      <a class="primary" href="Sketches/index.html">Open Pop Culture index</a>
    </div>
  </main>
</body>
</html>
