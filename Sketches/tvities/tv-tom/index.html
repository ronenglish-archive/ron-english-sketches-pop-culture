<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TV Tom | TVities | Ron English Catalogue RaisonnÃ©</title>

  <link rel="stylesheet" href="../../../css/styles.css" />

  <style>
    :root{ --border:#e5e7eb; --muted:#4b5563; --shadow:0 10px 30px rgba(0,0,0,.08); --radius:18px; --bg:#ffffff; --panel:#f3f4f6; --pill-bg:#ffffff; --pill-hover:#f9fafb; }
    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:#111; background:var(--bg); padding-left:0; padding-right:0; }
    .wrap{ max-width:1240px; margin:0 auto; padding:28px 18px 60px; }
    .nav-pills{ display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; margin-bottom:22px; justify-content:center; text-align:center; }
    .nav-pill{ padding:8px 14px; border-radius:999px; border:1px solid var(--border); background:var(--pill-bg); color:#111; text-decoration:none; font-size:14px; transition:background .12s ease, border-color .12s ease, transform .12s ease; }
    .nav-pill:hover{ background:var(--pill-hover); border-color:#d1d5db; transform:translateY(-1px); }
    .page-header{ max-width:1100px; margin:0 auto 28px; padding:0; text-align:center; }
    .page-title{ margin:0 0 10px; font-size:clamp(2rem,4vw,3rem); letter-spacing:-.02em; line-height:1.05; text-align:center; }
    .section-card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin-bottom:24px; }
    .section-card h2{ margin:0 0 8px; font-size:1.4rem; text-align:center; }
    .section-intro{ margin:0 0 18px; color:var(--muted); line-height:1.6; max-width:none; width:100%; text-align:center; }
    .gallery-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
    .card-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
    .gallery-item{ display:block; text-decoration:none; color:inherit; background:#fff; border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:transform .18s ease, box-shadow .18s ease; box-shadow:0 4px 18px rgba(0,0,0,.04); }
    .gallery-item:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.08); }
    .gallery-item img{ display:block; width:100%; height:320px; object-fit:contain; background:var(--panel); padding:8px; }
    .card-grid .gallery-item img{ height:420px; }
    .back-link{ margin-top:28px; text-align:left; }
    .back-link a{ display:inline-block; text-decoration:none; color:#111; border:1px solid var(--border); border-radius:999px; padding:10px 16px; background:#fff; }
    .back-link a:hover{ background:#f9fafb; }
    @media (max-width:560px){ .wrap{ padding:22px 14px 50px; } .gallery-grid,.card-grid{ grid-template-columns:1fr; } .gallery-item img{ height:280px; } .card-grid .gallery-item img{ height:340px; } }
  </style>
  <link rel="icon" type="image/png" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/favicon.png">
</head>
<body>
  <main class="wrap">
    <nav class="nav-pills" aria-label="Site navigation">
      <a class="nav-pill" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/">Catalogue home</a>
      <a class="nav-pill" href="../../index.html">Sketches</a>
      <a class="nav-pill" href="../index.html">TVities</a>
    </nav>

    <header class="page-header">
      <h1 class="page-title">TV Tom</h1>
    </header>
    <section class="section-card" aria-labelledby="original-drawing">
      <h2 id="original-drawing">Original Drawing</h2>
      <div class="gallery-grid">
        <a class="gallery-item" href="../../../images/Sketches/TVities/TV%20Tom%20ORIGINAL.jpg">
          <img src="../../../images/Sketches/TVities/TV%20Tom%20ORIGINAL.jpg" alt="TV Tom original drawing by Ron English" loading="lazy" />
        </a>
      </div>
    </section>
    <section class="section-card" aria-labelledby="digitized-versions">
      <h2 id="digitized-versions">Digitized Versions</h2>
      <div class="gallery-grid">
        <a class="gallery-item" href="../../../images/Sketches/TVities/TV%20Tom%20COLOR.jpg">
          <img src="../../../images/Sketches/TVities/TV%20Tom%20COLOR.jpg" alt="TV Tom digitized version by Ron English" loading="lazy" />
        </a>
        <a class="gallery-item" href="../../../images/Sketches/TVities/TV%20Tom%20ORIGINAL%20COLOR.jpg">
          <img src="../../../images/Sketches/TVities/TV%20Tom%20ORIGINAL%20COLOR.jpg" alt="TV Tom digitized version by Ron English" loading="lazy" />
        </a>
      </div>
    </section>
    <section class="section-card" aria-labelledby="collector-cards">
      <h2 id="collector-cards">Collector Cards</h2>
      <div class="card-grid">
        <a class="gallery-item" href="../../../images/Sketches/TVities/TV%20Tom%20card.jpg">
          <img src="../../../images/Sketches/TVities/TV%20Tom%20card.jpg" alt="TV Tom collector card by Ron English" loading="lazy" />
        </a>
      </div>
    </section>
    <div class="back-link">
      <a href="../index.html">â† Back to TVities</a>
    </div>

  </main>
</body>
</html>
